<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENEM Tracker — Ferretto</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0d10;--surface:#13151a;--surface2:#1a1d24;--surface3:#21252e;
  --border:#252932;--border2:#323847;
  --text:#dde2ee;--text2:#7d8699;--text3:#464e60;
  --accent:#a78bfa;--accent2:#8b5cf6;--accent-dim:rgba(167,139,250,.10);
  --amber:#fbbf24;--amber-dim:rgba(251,191,36,.11);
  --red:#f87171;--red-dim:rgba(248,113,113,.11);
  --green:#4ade80;--green-dim:rgba(74,222,128,.11);
  --blue:#38bdf8;--blue-dim:rgba(56,189,248,.10);
  --radius:5px;
  --font-mono:'IBM Plex Mono',monospace;
  --font-sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden}

/* LAYOUT */
.sidebar{width:200px;min-width:200px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:0}
.sidebar-logo{font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:.14em;color:var(--accent);padding:16px 16px 14px;border-bottom:1px solid var(--border);text-transform:uppercase;line-height:1.5}
.sidebar-logo small{color:var(--text3);display:block;font-weight:400;font-size:8px;margin-top:2px;letter-spacing:.04em;text-transform:none}
.nav{display:flex;flex-direction:column;gap:1px;padding:10px 8px;flex:1;overflow-y:auto}
.nav::-webkit-scrollbar{width:2px}
.nav::-webkit-scrollbar-thumb{background:var(--border2)}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:var(--radius);cursor:pointer;color:var(--text2);font-size:12px;transition:all .12s;border:none;background:none;text-align:left;width:100%}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent-dim);color:var(--accent)}
.nav-item svg{width:13px;height:13px;flex-shrink:0;opacity:.6}
.nav-item.active svg{opacity:1}
.nav-sep{font-family:var(--font-mono);font-size:7px;letter-spacing:.12em;color:var(--text3);text-transform:uppercase;padding:10px 9px 3px}

.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-height:0}
.main::-webkit-scrollbar{width:3px}
.main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.view{display:none;padding:24px 28px;flex:1}
.view.active{display:block}
#view-conteudo.active{display:flex;flex-direction:row;padding:0;overflow:hidden;min-height:0}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:13px 28px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:10;flex-shrink:0}
.topbar-title{font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;color:var(--text2);text-transform:uppercase}

/* BTN */
.btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:var(--radius);font-family:var(--font-mono);font-size:10px;font-weight:500;letter-spacing:.04em;cursor:pointer;border:1px solid transparent;transition:all .12s}
.btn-primary{background:var(--accent);color:#0d0014;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:transparent;color:var(--text2);border-color:var(--border2)}
.btn-ghost:hover{color:var(--text);background:var(--surface2)}
.btn-danger{background:transparent;color:var(--red);border-color:var(--red-dim)}
.btn-danger:hover{background:var(--red-dim)}
.btn-sm{padding:3px 9px;font-size:9px}

/* COUNTDOWN */
.countdown-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.countdown-left{display:flex;flex-direction:column;gap:2px}
.countdown-label{font-family:var(--font-mono);font-size:8px;letter-spacing:.12em;color:var(--text3);text-transform:uppercase}
.countdown-title{font-family:var(--font-mono);font-size:12px;color:var(--text);font-weight:500}
.countdown-sub{font-family:var(--font-mono);font-size:9px;color:var(--text3)}
.countdown-units{display:flex;gap:14px;align-items:flex-end}
.countdown-unit{text-align:center}
.countdown-num{font-family:var(--font-mono);font-size:22px;font-weight:600;color:var(--accent);line-height:1}
.countdown-unit-label{font-family:var(--font-mono);font-size:8px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-top:2px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 13px}
.stat-label{font-family:var(--font-mono);font-size:8px;letter-spacing:.1em;color:var(--text3);text-transform:uppercase;margin-bottom:6px}
.stat-value{font-family:var(--font-mono);font-size:18px;font-weight:600;color:var(--text);line-height:1}
.stat-sub{font-size:10px;color:var(--text3);margin-top:3px}
.stat-card.hi .stat-value{color:var(--accent)}
.stat-card.hi{border-color:rgba(167,139,250,.2)}

/* SECTION */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-title{font-family:var(--font-mono);font-size:8px;letter-spacing:.13em;color:var(--text3);text-transform:uppercase}

/* AREAS GRID */
.areas-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.area-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;cursor:pointer;transition:border-color .12s}
.area-card:hover{border-color:var(--border2)}
.area-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.area-card-name{font-size:11px;font-weight:500;color:var(--text);line-height:1.4}
.area-card-pct{font-family:var(--font-mono);font-size:10px;font-weight:600}
.area-bar-bg{height:3px;background:var(--surface3);border-radius:2px;margin-bottom:7px}
.area-bar-fill{height:100%;border-radius:2px;transition:width .5s}
.area-card-sub{font-family:var(--font-mono);font-size:8px;color:var(--text3)}

/* DASHBOARD LISTS */
.dash-list{display:flex;flex-direction:column;gap:5px;margin-bottom:16px}
.dash-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;display:flex;align-items:center;gap:10px}
.dash-item-name{font-size:11px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dash-item-area{font-family:var(--font-mono);font-size:8px;padding:1px 5px;border-radius:3px;flex-shrink:0}
.dash-item-pct{font-family:var(--font-mono);font-size:10px;font-weight:600;flex-shrink:0;width:34px;text-align:right}
.dash-bar{width:60px;height:3px;background:var(--surface3);border-radius:2px;flex-shrink:0}
.dash-bar-fill{height:100%;border-radius:2px}

/* CONTEUDO VIEW — dois painéis */
.co-layout{display:flex;flex-direction:row;flex:1;min-height:0;overflow:hidden}
.co-sidebar{width:220px;min-width:180px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:10px 0}
.co-sidebar::-webkit-scrollbar{width:2px}
.co-sidebar::-webkit-scrollbar-thumb{background:var(--border2)}
.co-main{display:flex;flex-direction:column;flex:1;min-width:0;min-height:0;overflow:hidden}
.co-content{flex:1;min-height:0;overflow-y:auto;padding:18px 22px 32px}
.co-content::-webkit-scrollbar{width:3px}
.co-content::-webkit-scrollbar-thumb{background:var(--border2)}

/* Conteudo sidebar nav */
.co-sep{font-family:var(--font-mono);font-size:7px;letter-spacing:.1em;color:var(--text3);text-transform:uppercase;padding:10px 12px 3px;border-top:1px solid var(--border);margin-top:4px}
.co-sep:first-child{border-top:none;margin-top:0}
.co-area-label{font-family:var(--font-mono);font-size:8px;letter-spacing:.08em;color:var(--text3);text-transform:uppercase;padding:6px 12px 3px}
.co-mat-item{display:flex;flex-direction:column;gap:3px;padding:7px 12px;cursor:pointer;border-left:2px solid transparent;transition:all .12s}
.co-mat-item:hover{background:var(--surface2)}
.co-mat-item.active{border-left-color:var(--accent);background:var(--accent-dim)}
.co-mat-item-row{display:flex;align-items:baseline;gap:5px}
.co-mat-name{font-size:11px;color:var(--text2);flex:1;min-width:0;overflow-wrap:break-word}
.co-mat-item.active .co-mat-name{color:var(--accent)}
.co-mat-pct{font-family:var(--font-mono);font-size:8px;color:var(--text3);flex-shrink:0}
.co-mat-bar{height:2px;background:var(--surface3);border-radius:1px}
.co-mat-bar-fill{height:100%;border-radius:1px;transition:width .4s}

/* Conteudo header */
.co-disc-header{margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.co-disc-title{font-size:14px;font-weight:500;margin-bottom:6px}
.co-disc-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.co-disc-meta-item{font-family:var(--font-mono);font-size:8px;color:var(--text3);white-space:nowrap}
.co-disc-meta-item span{color:var(--text2)}
.co-progress-bar{flex:1;min-width:80px;max-width:180px;height:4px;background:var(--surface3);border-radius:2px}
.co-progress-fill{height:100%;border-radius:2px;transition:width .4s}

/* Assunto card */
.assunto-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:visible}
.assunto-header{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;user-select:none;transition:background .12s}
.assunto-header:hover{background:var(--surface2)}
.assunto-chev{width:10px;height:10px;flex-shrink:0;color:var(--text3);transition:transform .15s}
.assunto-chev.open{transform:rotate(90deg)}
.assunto-name{font-size:12px;font-weight:500;flex:1;min-width:0;overflow-wrap:break-word;word-break:break-word;line-height:1.4;padding-right:6px}
.assunto-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
.assunto-counter{font-family:var(--font-mono);font-size:9px;color:var(--text3);white-space:nowrap}
.assunto-bar{width:44px;height:3px;background:var(--surface3);border-radius:2px}
.assunto-bar-fill{height:100%;border-radius:2px;transition:width .3s}
.assunto-pct{font-family:var(--font-mono);font-size:9px;font-weight:600;width:28px;text-align:right;white-space:nowrap}
.assunto-check-all{font-family:var(--font-mono);font-size:8px;padding:2px 7px;border-radius:3px;cursor:pointer;border:1px solid var(--border2);background:none;color:var(--text3);transition:all .12s}
.assunto-check-all:hover{color:var(--green);border-color:rgba(74,222,128,.3);background:var(--green-dim)}
.assunto-check-all.done{color:var(--green);border-color:rgba(74,222,128,.3);background:var(--green-dim)}

/* Aulas lista */
.aulas-body{display:none;border-top:1px solid var(--border);background:var(--surface2);border-radius:0 0 var(--radius) var(--radius)}
.aulas-body.open{display:block}
.aula-item{display:flex;align-items:center;gap:9px;padding:6px 14px 6px 28px;border-bottom:1px solid var(--border);min-width:0}
.aula-item:last-child{border-bottom:none}
.aula-cb{width:14px;height:14px;border-radius:3px;border:1px solid var(--border2);background:var(--surface3);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .12s}
.aula-cb.checked{background:var(--green);border-color:var(--green)}
.aula-cb svg{width:9px;height:9px}
.aula-label{font-size:11px;color:var(--text2);flex:1;line-height:1.4}
.aula-item.done .aula-label{color:var(--text3);text-decoration:line-through;text-decoration-color:var(--text3)}

/* SESSOES */
.sessions-list{display:flex;flex-direction:column;gap:5px}
.session-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:9px 13px;display:flex;align-items:center;gap:10px}
.session-date{font-family:var(--font-mono);font-size:9px;color:var(--text3);width:38px;flex-shrink:0}
.session-disc{font-size:12px;flex:1;min-width:0}
.session-tipo{font-family:var(--font-mono);font-size:9px;color:var(--text3)}
.session-dur{font-family:var(--font-mono);font-size:10px;color:var(--text2);flex-shrink:0}
.session-q{font-family:var(--font-mono);font-size:9px;color:var(--text3);flex-shrink:0}

/* ERROS */
.erros-list{display:flex;flex-direction:column;gap:5px}
.erro-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 13px;display:flex;align-items:flex-start;gap:10px}
.erro-item.revisado{opacity:.4}
.erro-check{width:15px;height:15px;border-radius:3px;border:1px solid var(--border2);background:var(--surface2);cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.erro-check.checked{background:var(--accent);border-color:var(--accent)}
.erro-check svg{width:9px;height:9px}
.erro-body{flex:1;min-width:0}
.erro-meta{display:flex;gap:6px;align-items:center;margin-bottom:3px;flex-wrap:wrap}
.erro-disc{font-size:12px;font-weight:500}
.erro-cat{font-family:var(--font-mono);font-size:8px;padding:1px 5px;border-radius:3px}
.erro-tema{font-size:11px;color:var(--text2)}
.erro-obs{font-size:11px;color:var(--text3);margin-top:2px;font-style:italic}
.erro-date{font-family:var(--font-mono);font-size:9px;color:var(--text3);flex-shrink:0}

/* SIMULADOS */
.simulado-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:9px}
.simulado-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:11px}
.simulado-name{font-size:12px;font-weight:500}
.simulado-meta{font-family:var(--font-mono);font-size:9px;color:var(--text3);margin-top:2px}
.sim-areas{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.sim-area{text-align:center;padding:5px 3px;background:var(--surface2);border-radius:3px;border:1px solid var(--border)}
.sim-area-name{font-family:var(--font-mono);font-size:8px;color:var(--text3);margin-bottom:3px;line-height:1.2}
.sim-area-nota{font-family:var(--font-mono);font-size:13px;font-weight:600}
.sim-area-detail{font-family:var(--font-mono);font-size:8px;color:var(--text3);margin-top:1px}
.sim-total-bar{margin-top:11px;padding-top:10px;border-top:1px solid var(--border);display:flex;align-items:center;gap:11px}
.sim-total-label{font-family:var(--font-mono);font-size:9px;color:var(--text3)}
.sim-total-bar-bg{flex:1;height:4px;background:var(--surface3);border-radius:2px}
.sim-total-bar-fill{height:100%;border-radius:2px;transition:width .4s}
.sim-total-pct{font-family:var(--font-mono);font-size:11px;font-weight:600}

/* FEYNMAN */
.fy-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:9px;transition:border-color .12s}
.fy-card:hover{border-color:var(--border2)}
.fy-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:11px;margin-bottom:11px}
.fy-card-meta{display:flex;flex-direction:column;gap:3px;min-width:0}
.fy-card-topico{font-size:13px;font-weight:500;color:var(--text);line-height:1.4;overflow-wrap:break-word}
.fy-card-sub{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.fy-card-disc{font-family:var(--font-mono);font-size:8px;padding:1px 5px;border-radius:3px}
.fy-card-date{font-family:var(--font-mono);font-size:9px;color:var(--text3)}
.fy-card-delete{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;line-height:1;flex-shrink:0;transition:color .12s}
.fy-card-delete:hover{color:var(--red)}
.fy-block{margin-bottom:9px}
.fy-block:last-child{margin-bottom:0}
.fy-block-q{font-family:var(--font-mono);font-size:8px;letter-spacing:.05em;color:var(--text3);text-transform:uppercase;margin-bottom:3px}
.fy-block-a{font-size:12px;color:var(--text2);line-height:1.6;padding:6px 9px;background:var(--surface2);border-radius:3px;border-left:2px solid var(--border2);overflow-wrap:break-word}
.fy-block-a.regra{border-left-color:var(--amber);color:var(--amber);font-weight:500}

/* FILTER BAR */
.filter-bar{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.filter-pill{font-family:var(--font-mono);font-size:9px;padding:3px 9px;border-radius:3px;border:1px solid var(--border2);background:var(--surface2);color:var(--text3);cursor:pointer;transition:all .12s}
.filter-pill.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.filter-sep{flex:1}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:7px;padding:20px;width:460px;max-width:calc(100vw - 30px);max-height:calc(100vh - 40px);overflow-y:auto}
.modal::-webkit-scrollbar{width:3px}
.modal::-webkit-scrollbar-thumb{background:var(--border2)}
.modal-title{font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text2);margin-bottom:16px;padding-bottom:11px;border-bottom:1px solid var(--border)}
.modal-feynman{width:540px}
.form-group{margin-bottom:11px}
.form-label{font-family:var(--font-mono);font-size:8px;letter-spacing:.08em;color:var(--text3);text-transform:uppercase;margin-bottom:4px;display:block}
.form-control{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:6px 9px;color:var(--text);font-family:var(--font-sans);font-size:12px;outline:none;transition:border-color .12s;-webkit-appearance:none;appearance:none}
.form-control:focus{border-color:var(--accent)}
select.form-control{cursor:pointer}
textarea.form-control{resize:vertical;min-height:52px;font-size:12px;line-height:1.6}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.form-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.form-footer{display:flex;gap:7px;justify-content:flex-end;margin-top:16px;padding-top:13px;border-top:1px solid var(--border)}
.form-hint{font-size:10px;color:var(--text3);margin-top:3px}
.form-divider{border:none;border-top:1px solid var(--border);margin:13px 0}
.fy-pergunta-label{font-size:11px;color:var(--text2);margin-bottom:4px;display:block;line-height:1.4}
.fy-pergunta-num{font-family:var(--font-mono);font-size:9px;color:var(--accent);margin-right:4px}
.toggle-expand{background:none;border:none;cursor:pointer;color:var(--text3);font-family:var(--font-mono);font-size:9px;display:flex;align-items:center;gap:4px;padding:0;margin-bottom:11px}
.toggle-expand:hover{color:var(--text2)}
.collapsible{display:none}
.collapsible.open{display:block}
.questao-block{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:9px;margin-bottom:6px}
.questao-block-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.questao-block-label{font-family:var(--font-mono);font-size:9px;color:var(--text3)}
.questao-remove{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;line-height:1;padding:0}
.questao-remove:hover{color:var(--red)}

/* CONFIG */
.config-section{margin-bottom:20px}
.config-section-title{font-family:var(--font-mono);font-size:8px;letter-spacing:.1em;color:var(--text3);text-transform:uppercase;margin-bottom:9px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.config-row{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.config-label{font-size:12px;flex:1}
.config-input{width:70px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:4px 7px;color:var(--text);font-family:var(--font-mono);font-size:12px;text-align:center;outline:none}
.config-input:focus{border-color:var(--accent)}
.config-select{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:4px 7px;color:var(--text);font-family:var(--font-sans);font-size:12px;outline:none;width:170px}

/* TOAST */
.toast{position:fixed;bottom:16px;right:16px;background:var(--surface2);border:1px solid var(--accent);border-radius:var(--radius);padding:8px 14px;font-family:var(--font-mono);font-size:9px;color:var(--accent);z-index:200;transform:translateY(50px);opacity:0;transition:all .2s;pointer-events:none;max-width:320px}
.toast.show{transform:translateY(0);opacity:1;pointer-events:auto}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty p{font-size:12px;line-height:1.7;margin-top:6px}

/* PROGRESS bar global */
.global-prog-bar{display:flex;align-items:center;gap:8px;padding:10px 22px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.global-prog-label{font-family:var(--font-mono);font-size:8px;color:var(--text3);white-space:nowrap}
.global-prog-bg{flex:1;height:4px;background:var(--surface3);border-radius:2px}
.global-prog-fill{height:100%;border-radius:2px;background:var(--accent);transition:width .5s}
.global-prog-pct{font-family:var(--font-mono);font-size:10px;font-weight:600;color:var(--accent);width:30px;text-align:right}

/* SEMANA ATUAL */
.semana-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px}
.semana-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.semana-title{font-family:var(--font-mono);font-size:8px;letter-spacing:.13em;color:var(--text3);text-transform:uppercase}
.semana-total{font-family:var(--font-mono);font-size:11px;color:var(--accent);font-weight:600}
.semana-dias{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.semana-dia{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 4px;border-radius:var(--radius);background:var(--surface2);border:1px solid var(--border)}
.semana-dia.tem-estudo{border-color:rgba(167,139,250,.3);background:rgba(167,139,250,.06)}
.semana-dia.hoje{border-color:var(--accent);background:var(--accent-dim)}
.semana-dia-label{font-family:var(--font-mono);font-size:7px;letter-spacing:.05em;color:var(--text3);text-transform:uppercase}
.semana-dia.hoje .semana-dia-label{color:var(--accent)}
.semana-dia-valor{font-family:var(--font-mono);font-size:10px;color:var(--text3);font-weight:600}
.semana-dia.tem-estudo .semana-dia-valor{color:var(--accent)}
.semana-dia.hoje .semana-dia-valor{color:var(--accent)}
.semana-dia-bar{width:100%;height:3px;background:var(--surface3);border-radius:2px}
.semana-dia-bar-fill{height:100%;border-radius:2px;transition:width .4s}

/* SESSÃO — botões editar/excluir */
.session-item{position:relative}
.session-actions{display:flex;gap:3px;flex-shrink:0;opacity:0;transition:opacity .15s}
.session-item:hover .session-actions{opacity:1}
.sess-btn{background:none;border:1px solid var(--border2);border-radius:3px;cursor:pointer;color:var(--text3);font-size:10px;padding:2px 7px;font-family:var(--font-mono);transition:all .12s;line-height:1.4}
.sess-btn:hover{color:var(--text);border-color:var(--border2);background:var(--surface3)}
.sess-btn.del:hover{color:var(--red);border-color:var(--red-dim);background:var(--red-dim)}

/* ERRO rico */
.erro-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 13px;display:flex;align-items:flex-start;gap:10px}
.erro-item.revisado{opacity:.45}
.erro-item.reincidente{border-left:3px solid var(--red)}
.erro-status-badge{font-family:var(--font-mono);font-size:8px;padding:2px 6px;border-radius:3px;border:1px solid transparent;cursor:pointer;white-space:nowrap;flex-shrink:0;margin-top:2px}
.erro-status-badge.pendente{background:var(--red-dim);color:var(--red);border-color:rgba(248,113,113,.3)}
.erro-status-badge.revisado-st{background:var(--green-dim);color:var(--green);border-color:rgba(74,222,128,.3)}
.erro-status-badge.reincidente-st{background:rgba(251,191,36,.12);color:var(--amber);border-color:rgba(251,191,36,.3)}
.erro-hierarchy{font-family:var(--font-mono);font-size:8px;color:var(--text3);margin-top:2px}

/* Erros filtros avançados */
.erros-filtros-wrap{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.erros-filtros-row{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.erros-filtros-label{font-family:var(--font-mono);font-size:8px;color:var(--text3);white-space:nowrap}
</style>
</head>

<div class="modal-overlay" id="modal-sessao">
  <div class="modal" style="width:500px">

    <form id="form-sessao" onsubmit="saveSessao(event)">
      <input type="hidden" id="s-edit-id" value="">
      <!-- 1. Área -->
      <div class="form-group">
        <label class="form-label">1. Área ENEM *</label>
        <select class="form-control" id="s-area" onchange="onSAreaChange()" required>
          <option value="">— selecione a área —</option>
          <option value="mat">Matemática e suas Tecnologias</option>
          <option value="nat">Ciências da Natureza e suas Tecnologias</option>
          <option value="hum">Ciências Humanas e suas Tecnologias</option>
          <option value="ling">Linguagens, Códigos e suas Tecnologias</option>
        </select>
      </div>
      <!-- 2. Matéria -->
      <div class="form-group">
        <label class="form-label">2. Matéria *</label>
        <select class="form-control" id="s-materia" onchange="onSMateriaChange()" required>
          <option value="">— selecione a área primeiro —</option>
        </select>
      </div>
      <!-- 3. Assunto -->
      <div class="form-group">
        <label class="form-label">3. Assunto</label>
        <select class="form-control" id="s-assunto" onchange="onSAssuntoChange()">
          <option value="">— selecione a matéria primeiro —</option>
        </select>
      </div>
      <!-- 4-5. Data e Duração -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">4. Data *</label>
          <input class="form-control" id="s-data" type="date" required>
        </div>
        <div class="form-group">
          <label class="form-label">5. Duração (min) *</label>
          <input class="form-control" id="s-dur" type="number" min="5" max="600" placeholder="60" required>
        </div>
      </div>
      <!-- 6. Tipo principal -->
      <div class="form-group">
        <label class="form-label">6. Tipo principal da sessão *</label>
        <select class="form-control" id="s-tipo" required>
          <option value="aula">Aula / Teoria</option>
          <option value="exercicios">Exercícios</option>
          <option value="revisao">Revisão</option>
          <option value="simulado">Simulado</option>
          <option value="livro">Livro / Apostila</option>
        </select>
      </div>
      <!-- 7. Atividades complementares -->
      <div class="form-group">
        <label class="form-label">7. Atividades complementares</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px">
          <label class="config-row" style="align-items:center;">
            <input type="checkbox" id="s-ativ-exercicios"> Resolvi exercícios
          </label>
          <label class="config-row" style="align-items:center;">
            <input type="checkbox" id="s-ativ-corrigi-erros"> Corrigi erros
          </label>
          <label class="config-row" style="align-items:center;">
            <input type="checkbox" id="s-ativ-anotacoes"> Fiz anotações
          </label>
          <label class="config-row" style="align-items:center;">
            <input type="checkbox" id="s-ativ-revisao-ativa"> Fiz revisão ativa
          </label>
          <label class="config-row" style="align-items:center;">
            <input type="checkbox" id="s-ativ-registrei-erros"> Registrei erros no caderno
          </label>
        </div>
        <div class="form-hint">Opcional, pode combinar com o tipo principal.</div>
      </div>
      <!-- 8-9. Questões -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">8. Questões feitas</label>
          <input class="form-control" id="s-qtotal" type="number" min="0" placeholder="0">
        </div>
        <div class="form-group">
          <label class="form-label">9. Questões erradas</label>
          <input class="form-control" id="s-qerradas" type="number" min="0" placeholder="0">
        </div>
      </div>
      <!-- 10. Fonte -->
      <div class="form-group">
        <label class="form-label">10. Material / fonte</label>
        <input class="form-control" id="s-fonte" type="text" placeholder="ex: Ferretto — Aula 42" maxlength="80">
      </div>
      <!-- 11. Aula estudada -->
      <div class="form-group">
        <label class="form-label">11. Aula estudada (opcional)</label>
        <select class="form-control" id="s-aula-especifica">
          <option value="">— nenhuma —</option>
        </select>
      </div>
      <!-- 12. Erros detalhados -->
      <hr class="form-divider">
      <button type="button" class="toggle-expand" onclick="toggleQuestoes()">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4l3 3 3-3"/></svg>
        <span id="qtoggle-label">10. Detalhar erros específicos</span>

      <div class="collapsible" id="questoes-detail">

        <button type="button" class="btn btn-ghost btn-sm" onclick="addQuestao()">+ Adicionar erro</button>
      </div>
      <div class="form-footer">
        <button type="button" class="btn btn-ghost" onclick="closeModal('sessao')">Cancelar</button>
        <button type="submit" class="btn btn-primary" id="btn-salvar-sessao">Salvar sessão</button>
      </div>
    </form>
  </div>

const DB_KEY = 'enem_tracker_v1';

function loadDB() {
  try {
    const data = JSON.parse(localStorage.getItem(DB_KEY) || 'null') || emptyDB();
    // Migração: garantir que sessões tenham data
    if (data.sessoes && Array.isArray(data.sessoes)) {
      data.sessoes.forEach(s => {
        if (!s.data) s.data = dayStr(0); // hoje
        if (!Array.isArray(s.atividadesComplementares)) s.atividadesComplementares = [];
        s.atividadesComplementares = s.atividadesComplementares.filter(a => typeof a === 'string');
      });
    }
    console.log("SESSÕES CARREGADAS:", data.sessoes);
    return data;
  } catch(e) { 
    console.log("Erro no loadDB:", e);
    return emptyDB(); 
  }
}
function emptyDB() {
  return { aulas:{}, sessoes:[], erros:[], simulados:[], feynman:[], config:{ meta_dia:120, meta_semana:600 } };
}
function saveDB() { 
  console.log("SESSÕES SALVAS:", DB.sessoes);
  try {
    localStorage.setItem(DB_KEY, JSON.stringify(DB)); 
  } catch(e) {
    console.error("Erro no saveDB:", e);
  }
}
let DB = loadDB();

// ── Helpers de progresso ────────────────────────────────────────────────────
function getAulasFeitas(assuntoKey, totalAulas) {
  const list = DB.aulas[assuntoKey];
  if (!list) return 0;
  return list.filter(Boolean).length;
}
function setAula(assuntoKey, idx, val) {
  if (!DB.aulas[assuntoKey]) {
    const a = ENEM_DATA.flatMap(ar=>ar.materias).flatMap(m=>m.assuntos).find(a=>a.key===assuntoKey);
    DB.aulas[assuntoKey] = new Array(a?.totalAulas||0).fill(false);
  }
  DB.aulas[assuntoKey][idx] = val;
  saveDB();
}
function setAllAulas(assuntoKey, totalAulas, val) {
  DB.aulas[assuntoKey] = new Array(totalAulas).fill(val);
  saveDB();
}

function triEstimadoPorAcertos(acertos) {
  if (acertos <= 22) return 580;
  if (acertos <= 25) return 650;
  if (acertos <= 29) return 700;
  if (acertos <= 32) return 750;
  if (acertos <= 35) return 800;
  if (acertos <= 38) return 850;
  return 900;
}

function getSimuladoTriEstimativas(sim) {
  if (sim.triEstimado && Array.isArray(sim.triEstimado) && sim.triEstimado.length === AREAS_SIMULADO.length) {
    return sim.triEstimado;
  }
  return AREAS_SIMULADO.map(a => {
    const result = sim.resultados?.find(x=>x.area===a.key) || { acertos: 0 };
    return { area: a.key, tri: triEstimadoPorAcertos(result.acertos||0) };
  });
}

function getSimuladoTriMedia(sim) {
  if (typeof sim.triMediaEstimado === 'number') return sim.triMediaEstimado;
  const estimativas = getSimuladoTriEstimativas(sim);
  return estimativas.length ? Math.round(estimativas.reduce((sum, item) => sum + item.tri, 0) / estimativas.length) : 0;
}

function assuntoProgress(assuntoKey, totalAulas) {
  const feitas = getAulasFeitas(assuntoKey, totalAulas);
  return { feitas, total: totalAulas, pct: totalAulas ? Math.round(feitas/totalAulas*100) : 0 };
}

function materiaProgress(matKey) {
  let feitas=0, total=0;
  ENEM_DATA.flatMap(a=>a.materias).find(m=>m.key===matKey)?.assuntos.forEach(a=>{
    const p = assuntoProgress(a.key, a.totalAulas);
    feitas += p.feitas; total += p.total;
  });
  return { feitas, total, pct: total ? Math.round(feitas/total*100) : 0 };
}

function areaProgress(areaKey) {
  let feitas=0, total=0;
  const area = ENEM_DATA.find(a=>a.key===areaKey);
  area?.materias.forEach(m => {
    m.assuntos.forEach(a => {
      const p = assuntoProgress(a.key, a.totalAulas);
      feitas += p.feitas; total += p.total;
    });
  });
  return { feitas, total, pct: total ? Math.round(feitas/total*100) : 0 };
}

function globalProgress() {
  let feitas=0, total=0;
  ENEM_DATA.forEach(area => area.materias.forEach(m => m.assuntos.forEach(a => {
    const p = assuntoProgress(a.key, a.totalAulas);
    feitas += p.feitas; total += p.total;
  })));
  return { feitas, total, pct: total ? Math.round(feitas/total*100) : 0 };
}

function showView(v) {
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelector(`[data-view="${v}"]`)?.classList.add('active');

  const titles = {
    dashboard:'Painel ENEM', conteudo:'Conteúdos Ferretto',
    sessoes:'Sessões de estudo', erros:'Caderno de erros',
    simulados:'Simulados ENEM', feynman:'Caderno Feynman', config:'Configurações',
  };
  document.getElementById('topbar-title').textContent = titles[v]||v;

  const acts = document.getElementById('topbar-actions');
  if (['dashboard','sessoes'].includes(v)) {
    acts.innerHTML = '<button class="btn btn-primary" onclick="openSessaoModal()">+ Sessão</button>';
  } else if (v==='simulados') {
    acts.innerHTML = '<button class="btn btn-primary" onclick="openSimuladoModal()">+ Simulado</button>';
  } else if (v==='feynman') {
    acts.innerHTML = '<button class="btn btn-primary" onclick="openFeynmanModal()">+ Feynman</button>';
  } else {
    acts.innerHTML = '';
  }

  // Toggle overflow para view conteudo (painel duplo)
  document.querySelector('.main').classList.toggle('conteudo-active', v==='conteudo');

  const renders = {
    dashboard: renderDashboard, conteudo: renderConteudo,
    sessoes: renderSessoes, erros: renderErros,
    simulados: renderSimulados, feynman: renderFeynman,
    config: renderConfig,
  };
  renders[v]?.();
}

  const semanas = Math.floor(dias/7);
  document.getElementById('countdown-bar').innerHTML = `
    <div class="countdown-left">
      <span class="countdown-label">Contagem regressiva</span>
      <span class="countdown-title">ENEM 2026 — 08 de novembro</span>
      <span class="countdown-sub">Dias 1 e 2 · Ferretto · ${dias} dias restantes</span>
    </div>
    <div class="countdown-units">
      <div class="countdown-unit"><div class="countdown-num">${dias}</div><div class="countdown-unit-label">dias</div></div>
      <div style="font-family:var(--font-mono);font-size:16px;color:var(--text3);padding-bottom:4px">·</div>
      <div class="countdown-unit"><div class="countdown-num" style="font-size:16px;color:var(--text2)">${semanas}</div><div class="countdown-unit-label">semanas</div></div>
    </div>`;
}

  const today = dayStr(0), w7 = dayStr(7);
  const minHoje = DB.sessoes.filter(s=>s.data===today).reduce((a,s)=>a+(s.dur||0),0);
  const minSemana = DB.sessoes.filter(s=>s.data>=w7).reduce((a,s)=>a+(s.dur||0),0);
  const metaDia = DB.config.meta_dia||120;
  const metaPct = Math.min(100,Math.round(minHoje/metaDia*100));
  const errosPend = DB.erros.filter(e=>e.status==='pendente'||(e.status===undefined&&!e.revisado)).length;
  const avgSimulado = DB.simulados.length ? Math.round(DB.simulados.reduce((sum, sim)=>sum + getSimuladoTriMedia(sim), 0)/DB.simulados.length) : 0;
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card ${gp.pct>0?'hi':''}">
      <div class="stat-label">Progresso geral</div>
      <div class="stat-value">${gp.pct}<span style="font-size:11px;color:var(--text3)">%</span></div>
      <div class="stat-sub">${gp.feitas}/${gp.total} aulas</div>
    </div>
    <div class="stat-card ${metaPct>=100?'hi':''}">
      <div class="stat-label">Hoje</div>
      <div class="stat-value">${fmtMin(minHoje)}</div>
      <div class="stat-sub">meta: ${metaPct}%</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Esta semana</div>
      <div class="stat-value">${fmtMin(minSemana)}</div>
      <div class="stat-sub">${DB.sessoes.filter(s=>s.data>=w7).length} sessões</div>
    </div>
    <div class="stat-card ${DB.simulados.length>0?'hi':''}">
      <div class="stat-label">Simulado médio</div>
      <div class="stat-value">${DB.simulados.length ? avgSimulado : '—'}</div>
      <div class="stat-sub">${DB.simulados.length} simulados</div>
    </div>
    <div class="stat-card ${errosPend>0?'':''}">
      <div class="stat-label">Erros pendentes</div>
      <div class="stat-value" style="${errosPend>0?'color:var(--red)':''}">${errosPend}</div>
      <div class="stat-sub" style="cursor:pointer;text-decoration:underline;color:var(--text3)" onclick="showView('erros')">ver caderno</div>
    </div>`;
}

// ── SEMANA ATUAL ───────────────────────────────────────────────────────────
// Lógica: identifica os 7 dias da semana corrente (Seg–Dom),
// soma os minutos das sessoes em cada dia, e renderiza barras proporcionais.
function renderSemana() {
  // Encontra o início da semana (segunda-feira)
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const diaSemana = hoje.getDay(); // 0=dom, 1=seg...
  const diasAteLeg = diaSemana === 0 ? 6 : diaSemana - 1;
  const segfeira = new Date(hoje);
  segfeira.setDate(hoje.getDate() - diasAteLeg);

  const diasLabels = ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
  const dias = Array.from({length:7}, (_,i) => {
    const d = new Date(segfeira); d.setDate(segfeira.getDate()+i);
    return d.toISOString().slice(0,10);
  });

  // Soma minutos por dia
  const minsPorDia = dias.map(ds => DB.sessoes.filter(s=>s.data===ds).reduce((a,s)=>a+(s.dur||0),0));
  const totalSemana = minsPorDia.reduce((a,m)=>a+m,0);
  const maxMin = Math.max(...minsPorDia, 1); // para normalizar barra
  const hojeStr = hoje.toISOString().slice(0,10);

  const diasHtml = dias.map((ds, i) => {
    const min = minsPorDia[i];
    const pct = Math.round(min/maxMin*100);
    const isHoje = ds === hojeStr;
    const temEstudo = min > 0;
    return `<div class="semana-dia ${temEstudo?'tem-estudo':''} ${isHoje?'hoje':''}">
      <div class="semana-dia-label">${diasLabels[i]}</div>
      <div class="semana-dia-bar"><div class="semana-dia-bar-fill" style="width:${pct}%;background:${isHoje?'var(--accent)':'var(--accent)'}"></div></div>
      <div class="semana-dia-valor">${min>0?fmtMin(min):'—'}</div>
    </div>`;
  }).join('');

  document.getElementById('semana-block').innerHTML = `
    <div class="semana-block">
      <div class="semana-header">
        <span class="semana-title">Semana atual</span>
        <span class="semana-total">${fmtMin(totalSemana)} total</span>
      </div>
      <div class="semana-dias">${diasHtml}</div>
    </div>`;
}

function renderLists() {
  // Coleta progresso de todas as matérias
  const mats = ENEM_DATA.flatMap(area => area.materias.map(m => {
    const p = materiaProgress(m.key);
    const area = ENEM_DATA.find(a=>a.materias.some(mm=>mm.key===m.key));
    return { ...m, pct: p.pct, feitas: p.feitas, total: p.total, areaKey: area.key, areaColor: area.color, areaLabel: area.label };
  }));

  const sorted = [...mats].sort((a,b)=>a.pct-b.pct);
  const atrasadas = sorted.filter(m=>m.pct<100).slice(0,6);
  const avancadas = [...mats].sort((a,b)=>b.pct-a.pct).filter(m=>m.pct>0).slice(0,6);

  const renderList = (items, id) => {
    if (!items.length) {
      document.getElementById(id).innerHTML = '<div style="font-size:11px;color:var(--text3);padding:8px 0">—</div>';
      return;
    }
    document.getElementById(id).innerHTML = items.map(m => `
      <div class="dash-item">
        <span class="dash-item-name">${m.label}</span>
        <span class="dash-item-area" style="background:${m.areaColor}18;color:${m.areaColor};border:1px solid ${m.areaColor}33">${m.areaLabel}</span>
        <div class="dash-bar"><div class="dash-bar-fill" style="width:${m.pct}%;background:${m.areaColor}"></div></div>
        <span class="dash-item-pct" style="color:${m.pct>0?m.areaColor:'var(--text3)'}">${m.pct}%</span>
      </div>`).join('');
  };

  renderList(atrasadas, 'list-atrasadas');
  renderList(avancadas, 'list-avancadas');
}

let coActiveMatKey = null;

function renderConteudo() {
  if (!coActiveMatKey) coActiveMatKey = ENEM_DATA[0].materias[0].key;
  renderCoNav();
  renderCoGlobalBar();
  renderCoContent(coActiveMatKey);
}

function coSelectArea(areaKey) {
  const area = ENEM_DATA.find(a=>a.key===areaKey);
  if (area?.materias?.length) coActiveMatKey = area.materias[0].key;
  renderCoNav();
  renderCoGlobalBar();

function renderCoNav() {
  let html = '';
  ENEM_DATA.forEach(area => {
    html += `<div class="co-area-label" style="color:${area.color}">${area.label}</div>`;
    area.materias.forEach(m => {

      const isActive = m.key === coActiveMatKey;
      html += `<div class="co-mat-item ${isActive?'active':''}" onclick="coSelectMat('${m.key}')">
        <div class="co-mat-item-row">
          <span class="co-mat-name">${m.label}</span>

      </div>`;

}

function coSelectMat(key) {
  coActiveMatKey = key;
  renderCoNav();
  renderCoContent(key);
}

function renderCoGlobalBar() {
  const g = globalProgress();
  document.getElementById('co-global-bar').innerHTML = `
    <span class="global-prog-label">Progresso geral Ferretto</span>
    <div class="global-prog-bg"><div class="global-prog-fill" style="width:${g.pct}%"></div></div>
    <span class="global-prog-pct">${g.pct}%</span>
    <span style="font-family:var(--font-mono);font-size:8px;color:var(--text3);white-space:nowrap">${g.feitas}/${g.total} aulas</span>`;
}

function renderCoContent(matKey) {
  let mat = null, area = null;
  for (const a of ENEM_DATA) {
    const found = a.materias.find(m=>m.key===matKey);
    if (found) { mat=found; area=a; break; }
  }
  if (!mat) return;

  const mp = materiaProgress(matKey);

  const assuntosHtml = mat.assuntos.map(ass => {
    const p = assuntoProgress(ass.key, ass.totalAulas);
    const allDone = p.feitas === p.total && p.total > 0;

    // Gera aulas (botões individuais)
    const aulasArr = DB.aulas[ass.key] || new Array(ass.totalAulas).fill(false);
    const aulasHtml = Array.from({length: ass.totalAulas}, (_,i) => {
      const done = aulasArr[i] || false;
      return `<div class="aula-item ${done?'done':''}">
        <div class="aula-cb ${done?'checked':''}" onclick="toggleAula('${ass.key}',${i},${ass.totalAulas},this)">
          ${done?`<svg viewBox="0 0 10 10" fill="none" stroke="white" stroke-width="2"><path d="M2 5l2.5 2.5L8 3"/></svg>`:''}
        </div>
        <span class="aula-label">Aula ${i+1}</span>
      </div>`;
    }).join('');

    return `<div class="assunto-card">
      <div class="assunto-header" onclick="toggleAssunto('${ass.key}')">
        <svg class="assunto-chev" id="chev-${ass.key}" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 2l4 3-4 3"/></svg>
        <span class="assunto-name">${ass.label}</span>
        <div class="assunto-right">
          <span class="assunto-counter">${p.feitas}/${p.total}</span>
          <div class="assunto-bar"><div class="assunto-bar-fill" style="width:${p.pct}%;background:${area.color}"></div></div>
          <span class="assunto-pct" style="color:${p.pct===100?'var(--green)':p.pct>0?area.color:'var(--text3)'}">${p.pct}%</span>
          <button class="assunto-check-all ${allDone?'done':''}" onclick="checkAll('${ass.key}',${ass.totalAulas},${allDone?'false':'true'},event)">
            ${allDone?'✓ feito':'marcar tudo'}
          </button>
        </div>
      </div>
      <div class="aulas-body" id="aulas-${ass.key}">
        ${aulasHtml}
      </div>
    </div>`;
  }).join('');

  document.getElementById('co-content').innerHTML = `
    <div class="co-disc-header">
      <div class="co-disc-title">${mat.label}</div>
      <div class="co-disc-meta">
        <span class="co-disc-meta-item">${mat.assuntos.length} assuntos</span>
        <span class="co-disc-meta-item">Total: <span>${mp.total}</span> aulas</span>
        <span class="co-disc-meta-item">Concluídas: <span>${mp.feitas}</span></span>
        <div class="co-progress-bar"><div class="co-progress-fill" style="width:${mp.pct}%;background:${area.color}"></div></div>
        <span class="co-disc-meta-item" style="color:${area.color};font-weight:500">${mp.pct}%</span>
      </div>
    </div>
    ${assuntosHtml}`;
}

function toggleAssunto(key) {
  const body = document.getElementById('aulas-'+key);
  const chev = document.getElementById('chev-'+key);
  if (!body) return;
  const open = body.classList.toggle('open');
  chev?.classList.toggle('open', open);
}

function toggleAula(assKey, idx, total, el) {
  const aulasArr = DB.aulas[assKey] || new Array(total).fill(false);
  DB.aulas[assKey] = aulasArr;
  const newVal = !DB.aulas[assKey][idx];
  DB.aulas[assKey][idx] = newVal;
  saveDB();
  // Atualiza UI local sem re-render total
  el.classList.toggle('checked', newVal);
  el.innerHTML = newVal ? `<svg viewBox="0 0 10 10" fill="none" stroke="white" stroke-width="2"><path d="M2 5l2.5 2.5L8 3"/></svg>` : '';
  el.closest('.aula-item').classList.toggle('done', newVal);
  // Atualiza contadores do assunto
  const feitas = (DB.aulas[assKey]||[]).filter(Boolean).length;
  const pct = total ? Math.round(feitas/total*100) : 0;
  const card = el.closest('.assunto-card');
  if (card) {
    card.querySelector('.assunto-counter').textContent = `${feitas}/${total}`;
    card.querySelector('.assunto-bar-fill').style.width = pct+'%';
    const pctEl = card.querySelector('.assunto-pct');
    pctEl.textContent = pct+'%';
    const btn = card.querySelector('.assunto-check-all');
    const allDone = feitas===total && total>0;
    btn.className = 'assunto-check-all'+(allDone?' done':'');
    btn.textContent = allDone ? '✓ feito' : 'marcar tudo';
    btn.setAttribute('onclick', `checkAll('${assKey}',${total},${allDone?'false':'true'},event)`);
    // Atualiza sidebar e global bar
    updateMatProgressUI(coActiveMatKey);
    renderCoGlobalBar();
  }
}

function checkAll(assKey, total, val, ev) {
  ev.stopPropagation();
  val = (val === true || val === 'true');
  DB.aulas[assKey] = new Array(total).fill(val);
  saveDB();
  // Re-render matéria
  renderCoContent(coActiveMatKey);
  renderCoNav();
  renderCoGlobalBar();
  showToast(val ? `${total} aulas concluídas` : 'Aulas desmarcadas');
}

function updateMatProgressUI(matKey) {
  const p = materiaProgress(matKey);
  const area = ENEM_DATA.find(a=>a.materias.some(m=>m.key===matKey));
  // Atualiza sidebar item
  const navItem = document.querySelector(`.co-mat-item[onclick*="${matKey}"]`);
  if (navItem) {
    navItem.querySelector('.co-mat-pct').textContent = p.pct+'%';
    navItem.querySelector('.co-mat-bar-fill').style.width = p.pct+'%';
  }
}

      const details = [s.aulaEspecifica, ...((s.atividadesComplementares && Array.isArray(s.atividadesComplementares)) ? s.atividadesComplementares : [])].filter(Boolean).map(text=>`<div style="font-size:10px;color:var(--text3);margin-top:2px">${esc(text)}</div>`).join('');

const TIPO_ERRO = {
  interpretacao:  'Interpretação de texto',
  conceitual:     'Erro conceitual',
  calculo:        'Erro de cálculo',
  desatencao:     'Desatenção',
  confusao:       'Confusão entre conceitos',
  grafico:        'Leitura de gráfico/tabela',
  estrategia:     'Estratégia inadequada',
  conteudo:       'Falta de conteúdo',
  tempo:          'Gestão de tempo',
};
const COR_ERRO = {
  interpretacao:'var(--blue)',  conceitual:'var(--amber)',
  calculo:'var(--red)',         desatencao:'var(--text3)',
  confusao:'var(--amber)',      grafico:'var(--accent)',
  estrategia:'var(--purple)',   conteudo:'var(--red)',
  tempo:'var(--green)',
};

function erroStatus(e) {
  if (e.status) return e.status;
  return e.revisado ? 'revisado' : 'pendente';
}

function renderErros() {
  let filterTipo = 'todas', filterArea = 'todas', showFiltro = 'pendentes';
  function render() {
    const statusPills = `
      <span class="erros-filtros-label">Exibir:</span>
      <span class="filter-pill ${showFiltro==='pendentes'?'active':''}" onclick="erroFiltroStatus('pendentes')">Pendentes</span>
      <span class="filter-pill ${showFiltro==='revisados'?'active':''}" onclick="erroFiltroStatus('revisados')">Revisados</span>
      <span class="filter-pill ${showFiltro==='reincidentes'?'active':''}" onclick="erroFiltroStatus('reincidentes')">Reincidentes</span>
      <span class="filter-pill ${showFiltro==='todos'?'active':''}" onclick="erroFiltroStatus('todos')">Todos</span>`;
    const areaPills = `
      <span class="erros-filtros-label">Área:</span>
      <span class="filter-pill ${filterArea==='todas'?'active':''}" onclick="erroFiltroArea('todas')">Todas</span>`+
      ENEM_DATA.map(a=>`<span class="filter-pill ${filterArea===a.key?'active':''}" onclick="erroFiltroArea('${a.key}')">${a.label}</span>`).join('');
    const tipoPills = `
      <span class="erros-filtros-label">Tipo:</span>
      <span class="filter-pill ${filterTipo==='todas'?'active':''}" onclick="erroFiltroTipo('todas')">Todos</span>`+
      Object.entries(TIPO_ERRO).map(([k,v])=>`<span class="filter-pill ${filterTipo===k?'active':''}" onclick="erroFiltroTipo('${k}')">${v}</span>`).join('');
    document.getElementById('erros-filters').innerHTML = `
      <div class="erros-filtros-wrap">
        <div class="erros-filtros-row">${statusPills}</div>
        <div class="erros-filtros-row">${areaPills}</div>
        <div class="erros-filtros-row">${tipoPills}</div>
      </div>`;
    let erros = [...DB.erros].sort((a,b)=>b.data.localeCompare(a.data));
    if (showFiltro==='pendentes')    erros = erros.filter(e=>erroStatus(e)==='pendente');
    if (showFiltro==='revisados')    erros = erros.filter(e=>erroStatus(e)==='revisado');
    if (showFiltro==='reincidentes') erros = erros.filter(e=>erroStatus(e)==='reincidente');
    if (filterArea!=='todas')        erros = erros.filter(e=>e.area===filterArea);
    if (filterTipo!=='todas')        erros = erros.filter(e=>e.tipo===filterTipo);
    if (!erros.length) {
      document.getElementById('erros-list').innerHTML = '<div class="empty"><p>Nenhum erro com estes filtros.</p></div>';
      return;
    }
    document.getElementById('erros-list').innerHTML = erros.map(e => {
      const cor = COR_ERRO[e.tipo]||'var(--text3)';
      const st  = erroStatus(e);
      const areaObj = ENEM_DATA.find(a=>a.key===e.area);
      const hierarchy = [areaObj?.label, e.materia||e.disc, e.assunto].filter(Boolean).join(' › ');
      const stCls = {pendente:'pendente',revisado:'revisado-st',reincidente:'reincidente-st'}[st];
      return `<div class="erro-item ${st==='revisado'?'revisado':''} ${st==='reincidente'?'reincidente':''}">
        <div class="erro-body">
          <div class="erro-meta">
            <span class="erro-disc">${e.materia||e.disc||'—'}</span>
            <span class="erro-cat" style="background:${cor}18;color:${cor};border:1px solid ${cor}33">${TIPO_ERRO[e.tipo]||e.tipo}</span>
            ${e.assunto?`<span style="font-family:var(--font-mono);font-size:8px;color:var(--text3)">${e.assunto}</span>`:''}
          </div>
          ${hierarchy?`<div class="erro-hierarchy">${hierarchy}</div>`:''}
          ${(e.tema||e.descricao)?`<div class="erro-tema" style="margin-top:3px">${e.tema||e.descricao}</div>`:''}
          ${e.obs?`<div class="erro-obs">${e.obs}</div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0">
          <span class="erro-date">${e.data.slice(5)}</span>
          <span class="erro-status-badge ${stCls}" onclick="cycleErroStatus('${e.id}')">${st}</span>
        </div>
      </div>`;
    }).join('');
  }
  window.erroFiltroTipo   = (f)=>{ filterTipo=f; render(); };
  window.erroFiltroArea   = (f)=>{ filterArea=f; render(); };
  window.erroFiltroStatus = (f)=>{ showFiltro=f; render(); };
  render();
}

function cycleErroStatus(id) {
  const e = DB.erros.find(x=>x.id===id);
  if (!e) return;
  const ciclo = {pendente:'revisado', revisado:'reincidente', reincidente:'pendente'};
  e.status = ciclo[erroStatus(e)] || 'pendente';
  e.revisado = e.status === 'revisado';
  saveDB(); renderErros(); renderStats(); showToast('Status: '+e.status);
}
function toggleErroRev(id) { cycleErroStatus(id); }

// ═══════════════════════════════════════════════════════════════════════════
function renderSimulados() {
  if (!DB.simulados.length) {
    document.getElementById('simulados-content').innerHTML = '<div class="empty"><p>Nenhum simulado registrado ainda.</p></div>';
    return;
  }
  const sorted = [...DB.simulados].sort((a,b)=>b.data.localeCompare(a.data));
  document.getElementById('simulados-content').innerHTML = sorted.map(sim => {
    const totalAc = sim.resultados.reduce((a,r)=>a+(r.acertos||0),0);
    const totalQ  = sim.resultados.reduce((a,r)=>a+(r.total||0),0);
    const pctTotal = totalQ>0 ? Math.round(totalAc/totalQ*100) : 0;
    const corTotal = pctTotal>=65?'var(--green)':pctTotal>=50?'var(--amber)':'var(--red)';
    const triEstimado = getSimuladoTriEstimativas(sim);
    const mediaEstimado = getSimuladoTriMedia(sim);
    const areasHtml = AREAS_SIMULADO.map(a => {
      const r = sim.resultados.find(x=>x.area===a.key);
      const tri = triEstimado.find(x=>x.area===a.key)?.tri || 0;
      if (!r) return `<div class="sim-area"><div class="sim-area-name">${a.label}</div><div class="sim-area-nota" style="color:var(--text3)">—</div><div style="font-size:11px;color:var(--text3);margin-top:4px">TRI aproximada: ${tri}</div></div>`;
      const pct = r.total>0 ? Math.round(r.acertos/r.total*100) : 0;
      const cor = pct>=65?'var(--green)':pct>=50?'var(--amber)':'var(--red)';
      const areaObj = ENEM_DATA.find(x=>x.key===a.key);
      return `<div class="sim-area">
        <div class="sim-area-name" style="color:${areaObj?.color}">${a.label}</div>
        <div class="sim-area-nota" style="color:${cor}">${pct}%</div>
        <div class="sim-area-detail">${r.acertos}/${r.total}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:4px">Nota estimada (TRI aproximada): ${tri}</div>
      </div>`;
    }).join('');
    return `<div class="simulado-card">
      <div class="simulado-header">
        <div><div class="simulado-name">${sim.nome}</div><div class="simulado-meta">${sim.data}</div></div>
        <div style="display:flex;align-items:flex-end;gap:8px">
          <button class="sess-btn btn-sm" onclick="editSimulado('${sim.id}')">editar</button>
          <button class="sess-btn del btn-sm" onclick="deleteSimulado('${sim.id}')">excluir</button>
          <span style="font-family:var(--font-mono);font-size:20px;font-weight:600;color:${corTotal}">${pctTotal}%</span>
        </div>
      </div>
      <div class="sim-areas">${areasHtml}</div>
      <div class="sim-total-bar">
        <span class="sim-total-label">${totalAc}/${totalQ} acertos</span>
        <div class="sim-total-bar-bg"><div class="sim-total-bar-fill" style="width:${pctTotal}%;background:${corTotal}"></div></div>
        <span class="sim-total-pct" style="color:${corTotal}">${pctTotal}%</span>
      </div>
      <div style="margin-top:8px;font-size:12px;color:var(--text3)">Média TRI aproximada: ${mediaEstimado}</div>
    </div>`;
  }).join('');
}

function renderFeynman() {
  const registros = DB.feynman||[];
  let activeArea = window._fyArea || 'todas';

  function render() {
    document.getElementById('fy-filters').innerHTML =
      `<span class="filter-pill ${activeArea==='todas'?'active':''}" onclick="fyAreaFilter('todas')">Todos</span>`+
      ENEM_DATA.filter(a=>registros.some(r=>r.area===a.key)).map(a=>
        `<span class="filter-pill ${activeArea===a.key?'active':''}" onclick="fyAreaFilter('${a.key}')">${a.label}</span>`
      ).join('');
    const filtrados = activeArea==='todas' ? registros : registros.filter(r=>r.area===activeArea);
    const sorted = [...filtrados].sort((a,b)=>b.data.localeCompare(a.data));
    if (!sorted.length) {
      document.getElementById('fy-list').innerHTML = '<div class="empty"><p>Nenhum registro Feynman ainda.<br>Após uma sessão de estudos, clique em "+ Feynman".</p></div>';
      return;
    }
    document.getElementById('fy-list').innerHTML = sorted.map(r => {
      const areaObj = ENEM_DATA.find(a=>a.key===r.area);
      const cor = areaObj?.color||'var(--accent)';
      const discLabel = [r.materia, r.assunto].filter(Boolean).join(' › ') || r.disc || '—';
      const explic = r.explicacao ? `<div class="fy-block"><div class="fy-block-q">Explicação</div><div class="fy-block-a">${esc(r.explicacao)}</div></div>` : '';
      const oldBlocos = r.explicacao ? '' : ['Explicação simples','Foco do ENEM','Confusões','Como o ENEM cobra','Regra mental']
        .map((q,i)=> {
          const resp = r['p'+(i+1)];
          return resp ? `<div class="fy-block"><div class="fy-block-q">${q}</div><div class="fy-block-a ${i===4?'regra':''}">${esc(resp)}</div></div>` : '';
        }).join('');
      return `<div class="fy-card">
        <div class="fy-card-header">
          <div class="fy-card-meta">
            <div class="fy-card-topico">${esc(r.topico)}</div>
            <div class="fy-card-sub">
              <span class="fy-card-disc" style="background:${cor}18;color:${cor};border:1px solid ${cor}33">${discLabel}</span>
              <span class="fy-card-date">${r.data}</span>
            </div>
          </div>
          <button class="fy-card-delete" onclick="deleteFy('${r.id}')">×</button>
        </div>
        ${explic||oldBlocos}
      </div>`;
    }).join('');
  }
  window.fyAreaFilter = (a)=>{ window._fyArea=a; activeArea=a; render(); };
  render();
}

function deleteFy(id) {
  if (!confirm('Excluir este registro?')) return;
  DB.feynman = (DB.feynman||[]).filter(r=>r.id!==id);
  saveDB(); renderFeynman();
}

function openSessaoModal(editId) {
  document.getElementById('modal-sessao-title').textContent = editId ? 'Editar sessão' : 'Nova sessão de estudo';
  document.getElementById('btn-salvar-sessao').textContent  = editId ? 'Salvar alterações' : 'Salvar sessão';
  document.getElementById('s-edit-id').value  = editId || '';
  document.getElementById('s-data').value     = dayStr(0);
  document.getElementById('s-dur').value      = '';
  document.getElementById('s-qtotal').value   = '';
  document.getElementById('s-qerradas').value = '';
  document.getElementById('s-fonte').value    = '';
  document.getElementById('s-tipo').value     = 'aula';
  document.getElementById('s-aula-especifica').innerHTML = '<option value="">— nenhuma —</option>';
  document.getElementById('s-aula-especifica').disabled = true;
  document.getElementById('s-ativ-exercicios').checked = false;
  document.getElementById('s-ativ-corrigi-erros').checked = false;
  document.getElementById('s-ativ-anotacoes').checked = false;
  document.getElementById('s-ativ-revisao-ativa').checked = false;
  document.getElementById('s-ativ-registrei-erros').checked = false;
  document.getElementById('s-area').value     = '';
  document.getElementById('questoes-container').innerHTML = '';
  document.getElementById('questoes-detail').classList.remove('open');
  document.getElementById('qtoggle-label').textContent = '10. Detalhar erros específicos';
  // Reseta selects encadeados
  populateSMaterias('');
  populateSAssuntos('');

  if (editId) {
    const s = DB.sessoes.find(x=>x.id===editId);
    if (s) {
      document.getElementById('s-area').value     = s.area || '';
      const materiaKey = s.materiaKey || findMateriaKey(s.area, s.materia) || '';
      const assuntoKey = s.assuntoKey || findAssuntoKey(materiaKey, s.assunto) || '';
      populateSMaterias(s.area||'', materiaKey||s.materia||'');
      populateSAssuntos(materiaKey||'', assuntoKey||s.assunto||'');
      document.getElementById('s-data').value     = s.data;
      document.getElementById('s-dur').value      = s.dur;
      document.getElementById('s-tipo').value     = s.tipoPrincipal || (s.tipo==='exercicio'?'exercicios':s.tipo) || 'aula';
      document.getElementById('s-qtotal').value   = s.qtotal||'';
      document.getElementById('s-qerradas').value = s.qerradas||'';
      document.getElementById('s-fonte').value    = s.fonte||'';
      populateSAulaEspecifica(assuntoKey||'', s.aulaEspecifica||'');
      const atividades = s.atividadesComplementares || [];
      document.getElementById('s-ativ-exercicios').checked = atividades.includes('Resolvi exercícios');
      document.getElementById('s-ativ-corrigi-erros').checked = atividades.includes('Corrigi erros');
      document.getElementById('s-ativ-anotacoes').checked = atividades.includes('Fiz anotações');
      document.getElementById('s-ativ-revisao-ativa').checked = atividades.includes('Fiz revisão ativa');
      document.getElementById('s-ativ-registrei-erros').checked = atividades.includes('Registrei erros no caderno');
    }
  }
  document.getElementById('modal-sessao').classList.add('open');
  setTimeout(()=>document.getElementById('s-area').focus(),50);
}

// Callbacks de select encadeado
function onSAreaChange() {
  const area = document.getElementById('s-area').value;
  populateSMaterias(area);
  populateSAssuntos('');
  populateSAulaEspecifica('');
}
function onSMateriaChange() {
  const matKey = document.getElementById('s-materia').value;
  populateSAssuntos(matKey);
  populateSAulaEspecifica('');
}
function onSAssuntoChange() {
  const assuntoKey = document.getElementById('s-assunto').value;
  populateSAulaEspecifica(assuntoKey);
}
function populateSMaterias(areaKey, selectedMat) {
  const sel = document.getElementById('s-materia');
  const area = ENEM_DATA.find(a=>a.key===areaKey);
  if (!area) {
    sel.innerHTML = '<option value="">— selecione a área primeiro —</option>';
    sel.removeAttribute('required');
    return;
  }
  sel.setAttribute('required','');
  const selectedKey = area.materias.some(m=>m.key===selectedMat)
    ? selectedMat
    : (area.materias.find(m=>m.label===selectedMat)?.key || '');
  sel.innerHTML = '<option value="">— selecione a matéria —</option>' +
    area.materias.map(m=>`<option value="${m.key}" ${m.key===selectedKey?'selected':''}>${m.label}</option>`).join('');
}
function populateSAssuntos(matKey, selectedAss) {
  const sel = document.getElementById('s-assunto');
  let mat = null;
  for (const a of ENEM_DATA) {
    mat = a.materias.find(m=>m.key===matKey);
    if (mat) break;
  }
  if (!mat) {
    sel.innerHTML = '<option value="">— selecione a matéria primeiro —</option>';
    sel.disabled = true;
    return;
  }
  sel.disabled = false;
  const selectedKey = mat.assuntos.some(a=>a.key===selectedAss)
    ? selectedAss
    : (mat.assuntos.find(a=>a.label===selectedAss)?.key || '');
  sel.innerHTML = '<option value="">— opcional —</option>' +
    mat.assuntos.map(a=>`<option value="${a.key}" ${a.key===selectedKey?'selected':''}>${a.label}</option>`).join('');
}

function findMateriaKey(areaKey, materiaLabel) {
  const area = ENEM_DATA.find(a=>a.key===areaKey);
  return area?.materias.find(m=>m.label===materiaLabel)?.key || '';
}

function findAssuntoKey(materiaKey, assuntoLabel) {
  const mat = ENEM_DATA.flatMap(a=>a.materias).find(m=>m.key===materiaKey);
  return mat?.assuntos.find(a=>a.label===assuntoLabel)?.key || '';
}

function extractAulaNumero(value) {
  if (!value) return '';
  const num = parseInt(value, 10);
  return Number.isInteger(num) ? num : '';
}

function onFYAreaChange() {
  const area = document.getElementById('fy-area').value;
  populateFYMaterias(area);
  populateFYAssuntos('');
}
function onFYMateriaChange() {
  const matKey = document.getElementById('fy-materia').value;
  populateFYAssuntos(matKey);
}
function populateSAulaEspecifica(assuntoKey, selectedAula) {
  const sel = document.getElementById('s-aula-especifica');
  sel.innerHTML = '<option value="">— nenhuma —</option>';
  sel.disabled = true;
  if (!assuntoKey) return;
  let mat = null;
  for (const a of ENEM_DATA) {
    mat = a.materias.find(m=>m.assuntos.some(s=>s.key===assuntoKey));
    if (mat) break;
  }
  if (!mat) return;
  const assunto = mat.assuntos.find(a=>a.key===assuntoKey);
  if (!assunto || !assunto.totalAulas) return;
  const max = assunto.totalAulas;
  const selectedIndex = parseInt(selectedAula, 10);
  let options = '<option value="">— nenhuma —</option>';
  for (let i = 1; i <= max; i++) {
    options += `<option value="${i}" ${i===selectedIndex?'selected':''}>Aula ${i}</option>`;
  }
  sel.innerHTML = options;
  sel.disabled = false;
}

function populateFYMaterias(areaKey, selectedMat) {
  const sel = document.getElementById('fy-materia');
  const area = ENEM_DATA.find(a=>a.key===areaKey);
  if (!area) {
    sel.innerHTML = '<option value="">— selecione a área primeiro —</option>';
    sel.removeAttribute('required');
    return;
  }
  sel.setAttribute('required','');
  sel.innerHTML = '<option value="">— selecione a matéria —</option>' +
    area.materias.map(m=>`<option value="${m.key}" ${m.key===selectedMat?'selected':''}>${m.label}</option>`).join('');
}
function populateFYAssuntos(matKey, selectedAss) {
  const sel = document.getElementById('fy-assunto');
  let mat = null;
  for (const a of ENEM_DATA) {
    mat = a.materias.find(m=>m.key===matKey);
    if (mat) break;
  }
  if (!mat) {
    sel.innerHTML = '<option value="">— selecione a matéria primeiro —</option>';
    return;
  }
  sel.innerHTML = '<option value="">— selecione o assunto —</option>' +
    mat.assuntos.map(a=>`<option value="${a.key}" ${a.key===selectedAss?'selected':''}>${a.label}</option>`).join('');
}

function saveSessao(ev) {
  ev.preventDefault();
  const editId   = document.getElementById('s-edit-id').value;
  const area     = document.getElementById('s-area').value;
  const materiaKey = document.getElementById('s-materia').value;
  const assuntoKey = document.getElementById('s-assunto').value;
  const dur      = parseInt(document.getElementById('s-dur').value);
  const data     = document.getElementById('s-data').value;
  const tipoPrincipal = document.getElementById('s-tipo').value;
  const qtotal   = parseInt(document.getElementById('s-qtotal').value)||0;
  const qerradas = parseInt(document.getElementById('s-qerradas').value)||0;
  const fonte    = document.getElementById('s-fonte').value.trim();
  const aulaNumero = parseInt(document.getElementById('s-aula-especifica').value, 10) || '';
  const aulaEspecifica = aulaNumero ? `Aula ${aulaNumero}` : '';
  const atividadesComplementares = [
    ['s-ativ-exercicios','Resolvi exercícios'],
    ['s-ativ-corrigi-erros','Corrigi erros'],
    ['s-ativ-anotacoes','Fiz anotações'],
    ['s-ativ-revisao-ativa','Fiz revisão ativa'],
    ['s-ativ-registrei-erros','Registrei erros no caderno'],
  ].filter(([id]) => document.getElementById(id).checked).map(([,label]) => label);

  if (!area)       { showToast('Selecione a área ENEM', true); return; }
  if (!materiaKey) { showToast('Selecione a matéria', true); return; }
  if (!tipoPrincipal) { showToast('Escolha o tipo principal da sessão', true); return; }
  if (qerradas > qtotal && qtotal > 0) { showToast('Erradas não pode superar total', true); return; }

  // Monta label display a partir dos selects
  const areaObj   = ENEM_DATA.find(a=>a.key===area);
  const matObj    = areaObj?.materias.find(m=>m.key===materiaKey);
  const assObj    = matObj?.assuntos.find(a=>a.key===assuntoKey);
  const materia   = matObj?.label || '';
  const assunto   = assObj?.label || '';
  const disc      = [materia, assunto].filter(Boolean).join(' › ');

  const sessaoData = { area, materia, assunto, materiaKey, assuntoKey, aulaNumero, aulaEspecifica, disc, dur, data, tipoPrincipal, atividadesComplementares, tipo: tipoPrincipal, qtotal, qerradas, fonte };

  if (editId) {
    const oldSession = DB.sessoes.find(s=>s.id===editId) || {};
    const oldAulaNumero = oldSession.aulaNumero || extractAulaNumero(oldSession.aulaEspecifica) || '';
    if (oldAulaNumero && oldSession.assuntoKey && oldSession.assuntoKey !== assuntoKey) {
      setAula(oldSession.assuntoKey, oldAulaNumero - 1, false);
    }
    if (oldAulaNumero && oldSession.assuntoKey && oldAulaNumero !== aulaNumero && oldSession.assuntoKey === assuntoKey) {
      setAula(oldSession.assuntoKey, oldAulaNumero - 1, false);
    }
    if (assuntoKey && aulaNumero) {
      setAula(assuntoKey, aulaNumero - 1, true);
    }
    // Edição: atualiza no array
    const idx = DB.sessoes.findIndex(s=>s.id===editId);
    if (idx>=0) DB.sessoes[idx] = { ...DB.sessoes[idx], ...sessaoData };
    showToast('Sessão atualizada');
  } else {
    // Nova sessão
    console.log("Salvando nova sessão, sessoes antes:", DB.sessoes.length);
    console.log("sessaoData:", sessaoData);
    const sid = uid();
    DB.sessoes.push({ id:sid, ...sessaoData });
    console.log("Salvando nova sessão, sessoes após:", DB.sessoes.length);
    if (assuntoKey && aulaNumero) {
      setAula(assuntoKey, aulaNumero - 1, true);
    }
    // Erros detalhados
    document.querySelectorAll('[id^="qb-"]').forEach(w=>{
      const n=w.id.replace('qb-','');
      DB.erros.push({
        id:uid(), sessao_id:sid, disc, area, materia, assunto,
        tipo:  w.querySelector(`#qe${n}-tipo`)?.value||'conceitual',
        tema:  w.querySelector(`#qe${n}-tema`)?.value.trim()||'',
        obs:   w.querySelector(`#qe${n}-obs`)?.value.trim()||'',
        status: 'pendente', revisado:false, data_revisao:null, data
      });
    });
    // Toast com ação Feynman
    const t = document.getElementById('toast');
    t.innerHTML = `Sessão salva &nbsp;·&nbsp; <span style="cursor:pointer;text-decoration:underline" onclick="openFeynmanModal()">Abrir Feynman</span>`;
    t.style.borderColor='var(--accent)'; t.style.color='var(--accent)';
    t.classList.add('show');
    clearTimeout(window._toastTimer);
    window._toastTimer = setTimeout(()=>{ t.classList.remove('show'); t.innerHTML=''; }, 5000);
  }

  saveDB();
  closeModal('sessao');
  renderDashboard();
  // Re-render sessões se visível
  if (document.getElementById('view-sessoes').classList.contains('active')) renderSessoes();
}

function editSessao(id) {
  openSessaoModal(id);
}

function deleteSessao(id) {
  if (!confirm('Excluir esta sessão? Os erros vinculados a ela serão mantidos.')) return;
  DB.sessoes = DB.sessoes.filter(s=>s.id!==id);
  saveDB();
  renderDashboard();
  renderSessoes();
  showToast('Sessão excluída');
}

function openSimuladoModal(editId) {
  const sim = editId ? DB.simulados.find(x=>x.id===editId) : null;
  document.getElementById('sim-edit-id').value = editId || '';
  document.getElementById('sim-data').value = sim?.data || dayStr(0);
  document.getElementById('sim-nome').value = sim?.nome || '';
  document.getElementById('btn-salvar-simulado').textContent = editId ? 'Salvar alterações' : 'Salvar simulado';
  document.getElementById('sim-areas-form').innerHTML = AREAS_SIMULADO.map(a=>{
    const result = sim?.resultados?.find(x=>x.area===a.key) || {};
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span style="flex:1;font-size:12px;color:var(--text2)">${a.label}</span>
      <label class="form-label" style="margin:0">Acertos</label>
      <input class="form-control" id="sim-ac-${a.key}" type="number" min="0" placeholder="0" value="${result.acertos||0}" style="width:55px;font-family:var(--font-mono);text-align:center">
      <span style="color:var(--text3);font-family:var(--font-mono);font-size:11px">/</span>
      <input class="form-control" id="sim-tot-${a.key}" type="number" value="${result.total||45}" min="1" style="width:48px;font-family:var(--font-mono);text-align:center">
    </div>`;
  }).join('');
  document.getElementById('modal-simulado').classList.add('open');
}

function saveSimulado(ev) {
  ev.preventDefault();
  const editId = document.getElementById('sim-edit-id').value;
  const resultados = AREAS_SIMULADO.map(a=>({
    area: a.key,
    acertos: parseInt(document.getElementById('sim-ac-'+a.key)?.value)||0,
    total:   parseInt(document.getElementById('sim-tot-'+a.key)?.value)||45,
  }));
  const triEstimado = AREAS_SIMULADO.map(a=>{
    const result = resultados.find(r=>r.area===a.key) || {acertos:0};
    return { area: a.key, tri: triEstimadoPorAcertos(result.acertos||0) };
  });
  const triMediaEstimado = triEstimado.length ? Math.round(triEstimado.reduce((sum,item)=>sum+item.tri,0)/triEstimado.length) : 0;
  const simData = {
    id: editId || uid(),
    nome: document.getElementById('sim-nome').value.trim(),
    data: document.getElementById('sim-data').value,
    resultados,
    triEstimado,
    triMediaEstimado,
  };
  if (editId) {
    const idx = DB.simulados.findIndex(x=>x.id===editId);
    if (idx >= 0) DB.simulados[idx] = simData;
    else DB.simulados.push(simData);
    showToast('Simulado atualizado');
  } else {
    DB.simulados.push(simData);
    showToast('Simulado salvo');
  }
  saveDB(); closeModal('simulado'); renderSimulados(); renderDashboard();
}

function editSimulado(id) { openSimuladoModal(id); }
function deleteSimulado(id) {
  if (!confirm('Excluir este simulado? Esta ação não pode ser desfeita.')) return;
  DB.simulados = DB.simulados.filter(s=>s.id!==id);
  saveDB();
  renderSimulados();
  renderDashboard();
  showToast('Simulado excluído');
}

function openFeynmanModal() {
  document.getElementById('fy-area').value = '';
  populateFYMaterias('');
  populateFYAssuntos('');
  document.getElementById('fy-data').value = dayStr(0);
  document.getElementById('fy-topico').value = '';
  document.getElementById('fy-explicacao').value = '';
  document.getElementById('fy-sessao-id').value = '';
  document.getElementById('modal-feynman').classList.add('open');
  setTimeout(()=>document.getElementById('fy-area').focus(),50);
}

function saveFeynman(ev) {
  ev.preventDefault();
  const area     = document.getElementById('fy-area').value;
  const materia  = document.getElementById('fy-materia').value;
  const assunto  = document.getElementById('fy-assunto').value;
  const topico   = document.getElementById('fy-topico').value.trim();
  const explicacao = document.getElementById('fy-explicacao').value.trim();
  const data     = document.getElementById('fy-data').value;

  if (!area) { showToast('Selecione a área ENEM', true); return; }
  if (!materia) { showToast('Selecione a matéria', true); return; }
  if (!assunto) { showToast('Selecione o assunto', true); return; }
  if (!topico) { showToast('Descreva o tópico ou conceito', true); return; }
  if (!explicacao) { showToast('Escreva a explicação no estilo Feynman', true); return; }

  if (!DB.feynman) DB.feynman=[];
  DB.feynman.push({
    id:uid(), sessao_id:document.getElementById('fy-sessao-id').value,
    area, materia, assunto,
    topico, explicacao,
    data,
  });
  saveDB(); closeModal('feynman'); showToast('Feynman salvo — isso ajuda a fixar o conteúdo.');
  const v = document.querySelector('.view.active')?.id;
  if (v==='view-feynman') renderFeynman();
}

// ═══════════════════════════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════════════════════════
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function dayStr(offset) {
  const d=new Date(); d.setDate(d.getDate()-offset); d.setHours(0,0,0,0);
  return d.toISOString().slice(0,10);
}
function fmtMin(m) {
  if (!m) return '0min';
  return m>=60 ? `${Math.floor(m/60)}h${m%60?String(m%60).padStart(2,'0'):''}` : m+'min';
}
function esc(s) {
  if (typeof s !== 'string') s = String(s || '');
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
function closeModal(id) { document.getElementById('modal-'+id).classList.remove('open'); }
function showToast(msg,err=false) {
  clearTimeout(window._toastTimer);
  const t=document.getElementById('toast');
  t.innerHTML=''; t.textContent=msg;
  t.style.borderColor=err?'var(--red)':'var(--accent)';
  t.style.color=err?'var(--red)':'var(--accent)';
  t.classList.add('show');
  window._toastTimer=setTimeout(()=>{ t.classList.remove('show'); t.innerHTML=''; },2500);
}
function exportData() {
  const b=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(b);
  a.download='enem-tracker-backup.json'; a.click();
}
function clearData() {
  if (!confirm('Apagar todo o progresso? Esta ação não pode ser desfeita.')) return;
  DB = emptyDB(); saveDB(); showToast('Dados apagados'); renderDashboard();
}

// Fix overflow para view conteudo
const mainStyle = document.createElement('style');
mainStyle.textContent = '.main.conteudo-active{overflow:hidden}';
document.head.appendChild(mainStyle);

document.querySelectorAll('.modal-overlay').forEach(o=>
  o.addEventListener('click', e=>{ if(e.target===o) o.classList.remove('open'); })
);

// ─── INIT ───────────────────────────────────────────────────────────────────
renderDashboard();
</script>
